# Phase 1 fast-validation config for Bomberman PVP training.
# All durations in frames (24 fps).
run:
  output_dir: runs/phase1
  seed: 42
  n_envs: 20

ppo:
  learning_rate: 3.0e-4
  n_steps: 8192
  batch_size: 128
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

network:
  features_dim: 256

phases:
  "1.1":
    min_steps: 100000
    max_steps: 500000
  "1.2":
    min_steps: 100000
    max_steps: 500000
  "1.3":
    min_steps: 100000
    max_steps: 500000

evaluation:
  interval: 25000
  episodes: 10
  video_episodes: 2
  deterministic: true

composite_score:
  phase_1_1:
    normalized_approach: 0.6
    low_illegal_action_rate: 0.2
    low_final_distance: 0.2
  phase_1_2:
    survival_rate: 0.2
    normalized_approach: 0.2
    bomb_efficiency: 0.2
    brick_destroy_rate: 0.2
    low_illegal_action_rate: 0.1
    kill_rate: 0.1
  phase_1_3:
    survival_rate: 0.15
    normalized_approach: 0.15
    bomb_efficiency: 0.15
    buff_pickup_rate: 0.25
    low_illegal_action_rate: 0.1
    kill_rate: 0.1
    low_final_distance: 0.1

progression:
  composite_threshold: 0.8
  patience: 5

checkpoint:
  interval: 50000

logging:
  heartbeat_seconds: 60

device: auto
